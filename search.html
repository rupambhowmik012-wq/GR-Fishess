<head>

    <style>
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        body { font-family: 'Lato', sans-serif; background-color: #f8fafc; }
        .refresh-active { opacity: 0; transform: scale(0.98); transition: all 0.4s ease; }

        @keyframes professionalSlide {
            0% { transform: translateY(-15px); opacity: 0; }
            15% { transform: translateY(0); opacity: 1; }
            85% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(15px); opacity: 0; }
        }
        #slidingBlock { display: inline-flex; animation: professionalSlide 4s infinite; color: #475569; }

        #clearSearch { width: 5vw; height: 5vw; color: #94a3b8; display: none; align-items: center; justify-content: center; font-size: 4.5vw; cursor: pointer; }

        .result-card { 
            display: flex; padding: 4vw; margin: 3vw 4vw; background: white; border-radius: 5vw;
            gap: 3vw; align-items: center; border: 1px solid #e2e8f0;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.1), 0 10px 15px -5px rgba(0, 0, 0, 0.05);
            border-bottom: 1.2vw solid #e2e8f0; transition: all 0.2s ease;
        }
        
        .result-info { flex: 1; border-right: 1px dashed #e2e8f0; padding-right: 2vw; }
        .result-info h4 { font-family: 'Montserrat', sans-serif; font-size: 4.2vw !important; font-weight: 600; }
        .result-img-container { width: 32vw; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
        .result-img { width: 100%; height: 25vw; object-fit: cover; border-radius: 4vw; margin-bottom: 2vw; }
        
        .qty-box { display: flex; align-items: center; justify-content: center; background: #f1f5f9; border-radius: 2vw; padding: 0.5vw; margin-bottom: 2.5vw; width: 100%; }
        .qty-btn { width: 8vw; height: 8vw; display: flex; align-items: center; justify-content: center; color: #800000; font-size: 4.5vw; font-weight: 900; }
        .qty-input { width: 8vw; text-align: center; background: transparent; font-weight: 800; font-size: 3.5vw; color: #1e293b; pointer-events: none; }

        .add-btn-small { 
            background: #d11243; color: white; padding: 2vw 0; border-radius: 2.5vw; font-weight: 800; 
            font-size: 3.2vw; width: 100%; box-shadow: 0 6px 15px rgba(209,18,67,0.4); 
            border-bottom: 0.8vw solid #9c0d32; transition: all 0.1s;
        }

        /* FIXED: Professional Remove Button Colour */
        .btn-remove { background: #475569 !important; border-bottom-color: #1e293b !important; box-shadow: 0 6px 15px rgba(71,85,105,0.3) !important; }
        .add-btn-small.added-success { background: #22c55e !important; border-bottom-color: #166534 !important; }

        #results-header { padding: 12px 16px 5px 16px; font-style: normal !important; }
        #live-counter { font-style: normal !important; font-weight: 600; letter-spacing: 0.5px; }
        #results-list { padding-top: 0px; margin-top: 0px; }
        
        .specs-text { font-size: 2.8vw; color: #64748b; font-weight: 700; display: flex; align-items: center; gap: 1vw; }
        .pill-dark { display: flex; align-items: center; gap: 8px; border: 1.5px solid #1e293b; padding: 10px 18px; border-radius: 9999px; color: #1e293b; font-size: 14px; }
        .history-pill { display: flex; align-items: center; gap: 8px; background: white; border: 1.5px solid #1e293b; padding: 8px 14px; border-radius: 9999px; color: #1e293b; font-size: 14px; }
        .remove-btn { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: #1e293b; color: #fff; font-size: 8px; }

        /* FIXED: Theme Maroon Floating Cart Popup */
        #floating-cart {
            position: fixed; bottom: 25px; left: 15px; right: 15px;
            background: #800000; color: white; border-radius: 16px;
            z-index: 2000; display: none; flex-direction: column;
            box-shadow: 0 10px 25px rgba(128,0,0,0.4); overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
        .savings-banner { background: #166534; color: #ffffff; padding: 8px 15px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .cart-main-info { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>

    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');
    const slidingName = document.getElementById('slidingName');
    const placeholderWrap = document.getElementById('placeholderWrap');

    const names = ["Rohu", "Prawns", "Pomfret", "Catla"];
    let nameIdx = 0;
    setInterval(() => {
        if(searchInput.value === "") {
            nameIdx = (nameIdx + 1) % names.length;
            slidingName.innerText = names[nameIdx];
        }
    }, 4000);

    function togglePlaceholder() {
        const val = searchInput.value;
        placeholderWrap.style.display = val === "" ? "flex" : "none";
        clearSearch.style.display = val === "" ? "none" : "flex";
    }

    function clearInput() {
        searchInput.value = "";
        togglePlaceholder();
        showBlankState();
        searchInput.focus();
    }

    function handleInput(e) {
        const val = e.target.value.trim();
        if (e.key === "Enter") { executeSearch(val); return; }
        if (val.length === 0) { showBlankState(); } 
        else { showSuggestions(val); }
    }

    function showBlankState() {
        document.getElementById('blank-state').classList.remove('hidden');
        document.getElementById('suggestion-box').classList.add('hidden');
        document.getElementById('results-list').classList.add('hidden');
        document.getElementById('results-header').classList.add('hidden');
        
        // Hide spell correction when showing blank state
        const spellCorrection = document.getElementById('spell-correction');
        if (spellCorrection) spellCorrection.classList.add('hidden');

        loadHistory();
    }

    // Calculates how many letters are different between two words
    function getEditDistance(a, b) {
        if(a.length === 0) return b.length;
        if(b.length === 0) return a.length;
        var matrix = [];
        for(var i = 0; i <= b.length; i++){ matrix[i] = [i]; }
        for(var j = 0; j <= a.length; j++){ matrix[0][j] = j; }
        for(var i = 1; i <= b.length; i++){
            for(var j = 1; j <= a.length; j++){
                if(b.charAt(i-1) == a.charAt(j-1)){
                    matrix[i][j] = matrix[i-1][j-1];
                } else {
                    matrix[i][j] = Math.min(matrix[i-1][j-1] + 1, Math.min(matrix[i][j-1] + 1, matrix[i-1][j] + 1));
                }
            }
        }
        return matrix[b.length][a.length];
    }

    // New matching function that handles both exact matches and typos
    function findMatches(query) {
        const q = query.toLowerCase().trim();
        return fishData.filter(f => {
            const name = f.name.toLowerCase();
            const desc = f.desc.toLowerCase();
            
            // 1. Check for exact match first
            if (name.includes(q) || desc.includes(q)) return true;

            // 2. Check for typos (Fuzzy matching)
            const words = name.split(/[\s()]+/); // Split fish name into separate words
            for (let word of words) {
                if (word.length > 2) { // Only check words longer than 2 letters
                    const distance = getEditDistance(q, word);
                    // Allow 2 typos for short words, 3 typos for longer words
                    const maxTypos = word.length <= 5 ? 2 : 3; 
                    if (distance <= maxTypos) return true;
                }
            }
            return false;
        });
    }

    function showSuggestions(query) {
        document.getElementById('results-list').classList.add('hidden');
        document.getElementById('results-header').classList.add('hidden');
        document.getElementById('blank-state').classList.add('hidden');
        const box = document.getElementById('suggestion-box');
        box.classList.remove('hidden');
        
        // Hide spell correction when just showing suggestions
        const spellCorrection = document.getElementById('spell-correction');
        if (spellCorrection) spellCorrection.classList.add('hidden');
        
        // USE THE NEW TYPO-TOLERANT MATCHER
        const filtered = findMatches(query);
        
        box.innerHTML = filtered.length > 0 ? filtered.map(f => `
            <div onclick="fillSearch('${f.name}')" class="p-5 border-b border-slate-50 flex items-center gap-4 text-slate-800 font-medium active:bg-slate-50">
                <i class="fas fa-search text-slate-300"></i> ${f.name}
            </div>`).join('') : `<div class="p-10 text-center text-slate-400">No matches found. Try checking your spelling!</div>`;
    }

    let cart = JSON.parse(localStorage.getItem('gr_fishes_cart')) || [];

    // FIXED: Professional logic with explicit class resets to prevent color glitch
    function updateItemQty(id, delta) {
        const input = document.getElementById(`qty-${id}`);
        const btn = document.getElementById(`btn-${id}`);
        let currentVal = parseInt(input.value);
        let newVal = currentVal + delta;

        const inCart = cart.some(c => c.id === id);

        if (inCart) {
            if (newVal >= 0) {
                input.value = newVal;
                if (delta < 0) {
                    btn.innerText = "REMOVE";
                    btn.className = "add-btn-small btn-remove";
                } else {
                    btn.innerText = "ADD +";
                    btn.className = "add-btn-small";
                }
            }
        } else {
            if (newVal >= 1) {
                input.value = newVal;
            }
        }
    }

    function addWithFeedback(id) {
        const input = document.getElementById(`qty-${id}`);
        const btn = document.getElementById(`btn-${id}`);
        const fish = fishData.find(f => f.id === id);
        const qty = parseInt(input.value);
        const existingIndex = cart.findIndex(c => c.id === id);

        if (btn.innerText === "REMOVE") {
            if (qty === 0) {
                if (existingIndex > -1) cart.splice(existingIndex, 1);
                input.value = 1; 
            } else {
                if (existingIndex > -1) cart[existingIndex].qty = qty;
            }
            btn.innerText = "REMOVED √";
            btn.className = "add-btn-small added-success"; // Green success
            setTimeout(() => {
                btn.innerText = "ADD +";
                btn.className = "add-btn-small"; // Strictly back to default Red
            }, 1000);
        } else {
            if (existingIndex > -1) cart[existingIndex].qty = qty; 
            else cart.push({ ...fish, qty: qty });

            btn.innerText = "ADDED √";
            btn.className = "add-btn-small added-success";
            setTimeout(() => {
                btn.innerText = "ADD +";
                btn.className = "add-btn-small";
            }, 1000);
        }

        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('gr_fishes_cart', JSON.stringify(cart));
        updateFloatingCart();
    }

    function updateFloatingCart() {
        const popup = document.getElementById('floating-cart');
        if (cart.length === 0) { popup.style.display = 'none'; return; }

        popup.style.display = 'flex';
        let totalItems = 0; let totalPrice = 0; let totalSavings = 0;

        cart.forEach(item => {
            totalItems += item.qty;
            totalPrice += (item.price * item.qty);
            let original = item.oldPrice || Math.round(item.price * 1.15);
            totalSavings += (original - item.price) * item.qty;
        });

        document.getElementById('popup-item-count').innerText = totalItems;
        document.getElementById('popup-total-price').innerText = `₹${totalPrice}`;
        document.getElementById('total-saved-popup').innerText = `₹${totalSavings}`;
    }

    function executeSearch(query) {
        if (!query) return;
        saveHistory(query);
        searchInput.blur();
        searchInput.value = query;
        togglePlaceholder();
        const content = document.getElementById('search-content');
        content.classList.add('refresh-active');
        
        setTimeout(() => {
            document.getElementById('suggestion-box').classList.add('hidden');
            document.getElementById('blank-state').classList.add('hidden');
            const list = document.getElementById('results-list');
            const header = document.getElementById('results-header');
            const spellCorrection = document.getElementById('spell-correction'); // Target the new div
            
            list.classList.remove('hidden');
            header.classList.remove('hidden');
            
            // USE THE NEW TYPO-TOLERANT MATCHER
            const matches = findMatches(query);
            
            document.getElementById('live-counter').innerText = `${matches.length} ITEMS FOUND`;
            
            if(matches.length > 0) {
                // Check if the customer typed the spelling exactly right
                const isExactMatch = matches.some(m => 
                    m.name.toLowerCase().includes(query.toLowerCase()) || 
                    m.desc.toLowerCase().includes(query.toLowerCase())
                );

                // If it's NOT an exact match (meaning it was a wrong spelling)
                if (!isExactMatch) {
                    spellCorrection.classList.remove('hidden');
                    // Show the "Showing results for..." Google style text
                    spellCorrection.innerHTML = `
                        <p class="mb-1">Showing results for <span class="font-bold text-[#800000] cursor-pointer hover:underline" onclick="fillSearch('${matches[0].name.split(' ')[0]}')">${matches[0].name}</span></p>
                        <p class="text-[3vw] text-slate-400">Search instead for <span class="italic font-medium">${query}</span></p>
                    `;
                } else {
                    // Spelling was perfectly correct, hide the message
                    spellCorrection.classList.add('hidden');
                }

                list.innerHTML = matches.map(f => `
                    <div class="result-card">
                        <div class="result-info">
                            <h4>${f.name}</h4>
                            <p class="text-[2.8vw] text-slate-400 mt-1 uppercase font-bold">${f.desc}</p>
                            <div class="specs-text mt-2">
                                <span>${f.weight}</span> | <span>${f.pieces}</span> | <span class="text-[#800000]">${f.serves}</span>
                            </div>
                            <div class="flex items-center gap-2 mt-3">
                                <span style="font-family:'Montserrat'; font-size:5vw; font-weight:700;">₹${f.price}</span>
                                <span class="text-slate-400 line-through text-[3vw] font-bold">₹${f.oldPrice}</span>
                            </div>
                        </div>
                        <div class="result-img-container">
                            <img src="${f.imgs[0]}" class="result-img shadow-md">
                            <div class="qty-box">
                                <div class="qty-btn" onclick="updateItemQty('${f.id}', -1)">-</div>
                                <input type="text" id="qty-${f.id}" value="1" readonly class="qty-input">
                                <div class="qty-btn" onclick="updateItemQty('${f.id}', 1)">+</div>
                            </div>
                            <button id="btn-${f.id}" onclick="addWithFeedback('${f.id}')" class="add-btn-small active:scale-95 transition-all">ADD +</button>
                        </div>
                    </div>`).join('');
            } else {
                // Completely unrecognized word
                spellCorrection.classList.add('hidden');
                list.innerHTML = `<div class="text-center py-24 font-black text-slate-300 uppercase tracking-widest">No Items Found</div>`;
            }
            content.classList.remove('refresh-active');
        }, 400);
    }

    function fillSearch(val) {
        searchInput.value = val;
        togglePlaceholder();
        executeSearch(val);
    }

    function saveHistory(q) {
        let history = JSON.parse(localStorage.getItem('search_history') || '[]');
        if(!history.includes(q)) {
            history.unshift(q);
            if(history.length > 8) history.pop();
            localStorage.setItem('search_history', JSON.stringify(history));
        }
    }

    function deleteHistoryItem(item, event) {
        event.stopPropagation();
        let history = JSON.parse(localStorage.getItem('search_history') || '[]');
        history = history.filter(h => h !== item);
        localStorage.setItem('search_history', JSON.stringify(history));
        loadHistory();
    }

    function clearAllHistory() {
        localStorage.removeItem('search_history');
        loadHistory();
    }

    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('search_history') || '[]');
        const container = document.getElementById('search-history');
        const section = document.getElementById('history-section');
        const trendingList = document.getElementById('trending-list');

        if(history.length > 0) {
            section.classList.remove('hidden');
            container.innerHTML = history.map(h => `
                <div class="history-pill" onclick="fillSearch('${h}')">
                    <i class="fas fa-history text-slate-900"></i>
                    <span>${h}</span>
                    <div class="remove-btn" onclick="deleteHistoryItem('${h}', event)">
                        <i class="fas fa-times"></i>
                    </div>
                </div>`).join('');
        } else { section.classList.add('hidden'); }

        const globalTrending = ["Rohu", "Prawns", "Catla", "Pomfret"];
        trendingList.innerHTML = globalTrending.map(name => `
            <div onclick="fillSearch('${name}')" class="pill-dark active:bg-slate-900 active:text-white transition-all">
                <i class="fas fa-arrow-trend-up"></i> ${name}
            </div>`).join('');
    }

    loadHistory();
    updateFloatingCart();
    </script>
</body>
</html>
